// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.2'
        classpath 'com.google.gms:google-services:4.4.2'
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// AGP 8.0+ Compatibility: Ensure all subprojects have a namespace
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            if (project.android.namespace == null) {
                // Generate a namespace based on the project name
                project.android.namespace = "com.rideyo." + project.name.replaceAll("-", ".")
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
