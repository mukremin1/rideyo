name: Deploy Supabase Payment

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: pehemxfydtwgpcasftyq
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set verification email secrets
        if: ${{ secrets.RESEND_API_KEY != '' }}
        run: |
          supabase secrets set \
            RESEND_API_KEY="$RESEND_API_KEY" \
            RESEND_FROM="RideYo <onboarding@resend.dev>" \
            APP_URL="https://www.ride-yo.com" \
            --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Deploy edge functions
        run: |
          supabase functions deploy process-payment --no-verify-jwt
          supabase functions deploy payment-callback --no-verify-jwt
          supabase functions deploy refund-payment --no-verify-jwt
          supabase functions deploy register-submerchant --no-verify-jwt
          supabase functions deploy vehicle-control --no-verify-jwt
          supabase functions deploy verify-license --no-verify-jwt
          supabase functions deploy resend-verification --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
